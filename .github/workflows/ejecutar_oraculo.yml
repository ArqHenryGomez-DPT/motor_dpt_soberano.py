name: Ejecutar Oráculo Soberano

on: [push]

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Diagnóstico de estructura
        run: |
          echo "--- Mapeo del Sistema de Archivos ---"
          ls -R
          echo "--- Fin del Mapeo ---"

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: pip install web3

      - name: Ejecutar motor
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          echo "Intentando ejecución directa..."
          python3 motor_dpt_soberano.py
