name: Ejecutar Oráculo Soberano

on: [push]

jobs:
  ejecucion-directa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Ejecutar motor
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          echo "Listando archivos en la raíz:"
          ls -F
          python3 motor_dpt_soberano.py
